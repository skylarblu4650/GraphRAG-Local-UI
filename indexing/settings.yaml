async_mode: threaded
cache:
  base_dir: cache
  type: file
chunks:
  group_by_columns:
  - id
  overlap: 64
  size: 512
claim_extraction:
  description: Any claims or facts that could be relevant to information discovery.
  enabled: false
  max_gleanings: 0
  prompt: prompts/claim_extraction.txt
cluster_graph:
  max_cluster_size: 10
community_reports:
  max_input_length: 4000
  max_length: 2000
  prompt: prompts/community_report.txt
embed_graph:
  enabled: false
embeddings:
  async_mode: threaded
  llm:
    api_base: http://host.docker.internal:11434/v1
    api_key: ${GRAPHRAG_API_KEY}
    concurrent_requests: 2
    max_retries: 3
    model: nomic-embed-text:latest
    provider: openai_embedding
    type: openai_embedding
encoding_model: cl100k_base
entity_extraction:
  entity_types:
  - organization
  - person
  - geo
  - event
  max_gleanings: 1
  prompt: prompts/entity_extraction.txt
global_search:
  concurrency: 2
input:
  base_dir: input
  file_encoding: utf-8
  file_pattern: .*\.txt$
  file_type: text
  type: file
llm:
  api_base: http://host.docker.internal:11434/v1
  api_key: ${GRAPHRAG_API_KEY}
  concurrent_requests: 2
  max_retries: 3
  max_tokens: 1024
  model: mistral-small:24b
  model_supports_json: true
  provider: openai_chat
  temperature: 0.5
  type: openai
local_search:
  max_tokens: 12000
parallelization:
  num_threads: 4
  stagger: 0.3
reporting:
  base_dir: output/${timestamp}/reports
  type: file
skip_workflows: []
snapshots:
  graphml: false
  raw_entities: false
  top_level_nodes: false
storage:
  base_dir: output/${timestamp}/artifacts
  type: file
summarize_descriptions:
  max_length: 500
  prompt: prompts/summarize_descriptions.txt
umap:
  enabled: false
